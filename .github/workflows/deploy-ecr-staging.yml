name: Deploy to ECR (Staging)

on:
  push:
    branches:
      - staging
    paths:
      - 'server/**'
      - 'models/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy-ecr-staging.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Push to ECR (Staging)
    runs-on: ubuntu-latest
    environment: AWS_OIDC

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
      ECR_REPOSITORY: stock-api-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "✅ Pushed image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "✅ Pushed image: $ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deploy to App Runner
        env:
          APP_RUNNER_ARN: arn:aws:apprunner:ap-northeast-1:980921748690:service/stock-api-staging/38f82d7440364aa2a8dcefacbd906d55
        run: |
          # RUNNINGになるまで待機（PAUSED→resume / OPERATION_IN_PROGRESS→wait）
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service --service-arn "$APP_RUNNER_ARN" --query 'Service.Status' --output text)
            echo "App Runner status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              break
            elif [ "$STATUS" = "PAUSED" ]; then
              echo "▶️ Resuming App Runner..."
              aws apprunner resume-service --service-arn "$APP_RUNNER_ARN"
            fi
            echo "⏳ Waiting... ($i/60)"
            sleep 10
          done
          echo "🚀 Starting deployment..."
          aws apprunner start-deployment --service-arn "$APP_RUNNER_ARN"
          echo "✅ Deployment started"
