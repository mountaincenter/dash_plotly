name: Test API Connectivity

on:
  workflow_dispatch:

jobs:
  test-apis:
    name: J-Quants + EDINET API Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Install jquants-cli
        run: |
          JQUANTS_VERSION="1.0.0"
          curl -sL "https://github.com/J-Quants/jquants-cli/releases/download/v${JQUANTS_VERSION}/jquants-${JQUANTS_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/jquants.tar.gz
          tar -xzf /tmp/jquants.tar.gz -C /tmp/
          chmod +x /tmp/jquants
          sudo mv /tmp/jquants /usr/local/bin/jquants
          jquants --version

      - name: Setup J-Quants authentication
        run: |
          mkdir -p ~/.config/jquants
          EPOCH=$(date +%s)
          printf '{"api_key":"%s","saved_at":%s}\n' "${{ secrets.JQUANTS_API_KEY }}" "$EPOCH" > ~/.config/jquants/credentials.json

      - name: Run API connectivity test
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          SLACK_TEST_WEBHOOK_URL: ${{ secrets.SLACK_TEST_WEBHOOK_URL }}
        run: python3 scripts/test_api_connectivity.py
