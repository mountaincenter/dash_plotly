name: Data Pipeline (Staging - Granville v2)

on:
  schedule:
    # staging: production(16:45/23:00)と被らない時間帯
    - cron: "0 9 * * *"   # UTC 09:00 = JST 18:00 - 振り返り（日足更新 + シグナル生成）
    - cron: "0 16 * * *"  # UTC 16:00 = JST 01:00 (25:00) - 統合準備（production grok取得 + 推奨 + 価格取得 + デプロイ）
    - cron: "0 22 * * *"  # UTC 22:00 = JST 07:00 - CME終値確定 + 判定更新
  workflow_dispatch:
    inputs:
      skip_trading_day_check:
        description: "営業日チェックをスキップ（強制実行）"
        type: boolean
        default: false
      mode:
        description: "実行モード"
        type: choice
        options:
          - auto
          - review_only
          - prepare_only
          - cme_update_only
        default: auto

permissions:
  id-token: write
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    environment: AWS_OIDC

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
      S3_BUCKET: stock-api-data-staging
      S3_PREFIX: parquet/
      APP_RUNNER_ARN: arn:aws:apprunner:ap-northeast-1:980921748690:service/stock-api-staging/38f82d7440364aa2a8dcefacbd906d55

    steps:
      - name: Checkout repository (staging branch)
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install jquants-cli
        run: |
          JQUANTS_VERSION="1.0.0"
          curl -sL "https://github.com/J-Quants/jquants-cli/releases/download/v${JQUANTS_VERSION}/jquants-${JQUANTS_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/jquants.tar.gz
          tar -xzf /tmp/jquants.tar.gz -C /tmp/
          chmod +x /tmp/jquants
          sudo mv /tmp/jquants /usr/local/bin/jquants
          echo "✅ jquants-cli $(jquants --version) installed"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup J-Quants authentication
        run: |
          cat > .env.jquants <<EOF
          JQUANTS_API_KEY=${{ secrets.JQUANTS_API_KEY }}
          EOF

          mkdir -p ~/.config/jquants
          EPOCH=$(date +%s)
          printf '{"api_key":"%s","saved_at":%s}\n' "${{ secrets.JQUANTS_API_KEY }}" "$EPOCH" > ~/.config/jquants/credentials.json

          echo "✅ J-Quants authentication configured (Python + CLI)"

      # ===== 実行モード判定 =====
      - name: Determine execution mode
        id: exec_mode
        run: |
          CURRENT_HOUR=$(TZ=Asia/Tokyo date +%H)
          echo "Current hour (JST): $CURRENT_HOUR"

          MODE="${{ github.event.inputs.mode || 'auto' }}"

          if [ "$MODE" = "review_only" ]; then
            echo "phase=review" >> $GITHUB_OUTPUT
            echo "📊 FORCED: Review only (18:00相当)"
          elif [ "$MODE" = "prepare_only" ]; then
            echo "phase=prepare" >> $GITHUB_OUTPUT
            echo "📋 FORCED: Prepare only (25:00相当)"
          elif [ "$MODE" = "cme_update_only" ]; then
            echo "phase=cme_update" >> $GITHUB_OUTPUT
            echo "🌅 FORCED: CME update only (07:00相当)"
          elif [ "$CURRENT_HOUR" = "18" ]; then
            echo "phase=review" >> $GITHUB_OUTPUT
            echo "📊 18:00 JST - Review mode"
          elif [ "$CURRENT_HOUR" = "01" ]; then
            echo "phase=prepare" >> $GITHUB_OUTPUT
            echo "📋 01:00 JST (25:00) - Prepare mode"
          elif [ "$CURRENT_HOUR" = "07" ]; then
            echo "phase=cme_update" >> $GITHUB_OUTPUT
            echo "🌅 07:00 JST - CME update mode"
          else
            echo "phase=review" >> $GITHUB_OUTPUT
            echo "⚠️ Unknown hour ($CURRENT_HOUR), defaulting to review"
          fi

      # ===== 営業日チェック =====
      - name: Check trading day (18:00 review)
        id: check_trading
        if: steps.exec_mode.outputs.phase == 'review' && github.event.inputs.skip_trading_day_check != 'true'
        run: |
          python scripts/check_trading_day.py
        continue-on-error: true

      - name: Check next trading day (22:00 prepare)
        id: check_next_trading
        if: steps.exec_mode.outputs.phase == 'prepare' && github.event.inputs.skip_trading_day_check != 'true'
        run: |
          python scripts/check_next_day_trading.py
        continue-on-error: true

      - name: Check trading day (07:00 CME update)
        id: check_trading_cme
        if: steps.exec_mode.outputs.phase == 'cme_update' && github.event.inputs.skip_trading_day_check != 'true'
        run: |
          python scripts/check_trading_day.py
        continue-on-error: true

      - name: Skip if not trading day
        if: |
          (steps.exec_mode.outputs.phase == 'review' && steps.check_trading.outcome == 'failure' && github.event.inputs.skip_trading_day_check != 'true') ||
          (steps.exec_mode.outputs.phase == 'prepare' && steps.check_next_trading.outcome == 'failure' && github.event.inputs.skip_trading_day_check != 'true') ||
          (steps.exec_mode.outputs.phase == 'cme_update' && steps.check_trading_cme.outcome == 'failure' && github.event.inputs.skip_trading_day_check != 'true')
        run: |
          echo "❌ Not a trading day. Skipping pipeline."
          exit 0

      # ===== S3からデータダウンロード =====
      - name: Download data from S3
        run: |
          echo "📥 Downloading data from S3..."
          mkdir -p data/parquet/granville data/parquet/backtest data/parquet/pairs data/parquet/screening

          # staging S3からgranville関連データ
          aws s3 sync "s3://$S3_BUCKET/$S3_PREFIX" data/parquet/ --only-show-errors \
            --exclude "market_summary/*" --exclude "macro/*" --exclude "ml/*"

          # screening prices（ペアトレード用、staging S3になければproductionから）
          for f in prices_max_1d_core_large.parquet prices_max_1d_mid400.parquet; do
            if [ ! -f "data/parquet/screening/$f" ]; then
              echo "  Fetching screening/$f..."
              aws s3 cp "s3://$S3_BUCKET/${S3_PREFIX}screening/$f" "data/parquet/screening/$f" --only-show-errors || \
              aws s3 cp "s3://stock-api-data/${S3_PREFIX}screening/$f" "data/parquet/screening/$f" --only-show-errors || \
              echo "  ✗ screening/$f not found"
            fi
          done

          # production S3からindex/futures/stock_results（DD計算用）
          for f in index_prices_max_1d.parquet futures_prices_max_1d.parquet stock_results.parquet stock_results_summary.parquet; do
            echo "  Fetching $f from production S3..."
            aws s3 cp "s3://stock-api-data/${S3_PREFIX}$f" "data/parquet/$f" --only-show-errors && echo "  ✓ $f" || echo "  ✗ $f not found"
          done

          # production S3からマスタデータ（staging S3にない場合のみ）
          for f in meta_jquants.parquet meta.parquet; do
            if [ ! -f "data/parquet/$f" ]; then
              echo "  Fetching $f from production S3..."
              aws s3 cp "s3://stock-api-data/${S3_PREFIX}$f" "data/parquet/$f" --only-show-errors && echo "  ✓ $f" || echo "  ✗ $f not found"
            fi
          done

          # grok_trending.parquet は production 23:00 の結果を常に最新取得
          echo "  Fetching grok_trending.parquet from production S3 (always overwrite)..."
          aws s3 cp "s3://stock-api-data/${S3_PREFIX}grok_trending.parquet" "data/parquet/grok_trending.parquet" --only-show-errors && echo "  ✓ grok_trending.parquet" || echo "  ✗ grok_trending.parquet not found"
          # production 完了確認用: S3上の最終更新日時をログ出力
          S3_LAST=$(aws s3api head-object --bucket stock-api-data --key "${S3_PREFIX}grok_trending.parquet" --query 'LastModified' --output text 2>/dev/null || echo "N/A")
          echo "  ℹ grok_trending.parquet S3 LastModified: $S3_LAST"

          echo "✅ Data downloaded"

      # ===== 18:00 振り返りフェーズ =====
      - name: "[Review] Fetch Nikkei VI from Rakuten-Sec"
        if: steps.exec_mode.outputs.phase == 'review'
        run: |
          echo "📊 Fetching Nikkei VI (JNIV) from Rakuten-Sec / trkd-asia..."
          python scripts/pipeline/fetch_nikkei_vi_rakuten.py
        timeout-minutes: 5

      - name: "[Review] Update TOPIX daily prices"
        if: steps.exec_mode.outputs.phase == 'review'
        run: |
          echo "📈 Updating TOPIX 1,660 stocks daily prices..."
          python scripts/pipeline/update_granville_prices.py
        timeout-minutes: 45

      - name: "[Review] Fetch Calendar prices (1306 + TOPIX500)"
        if: steps.exec_mode.outputs.phase == 'review'
        run: |
          echo "📈 Fetching Calendar prices (1306 ETF + TOPIX500 OC)..."
          python scripts/pipeline/fetch_calendar_prices.py
        timeout-minutes: 30

      - name: "[Review] Generate Granville signals"
        if: steps.exec_mode.outputs.phase == 'review'
        run: |
          echo "🔍 Generating Granville B1-B4 signals..."
          python scripts/pipeline/generate_granville_signals.py
        timeout-minutes: 30

      - name: "[Review] Generate pairs trading signals"
        if: steps.exec_mode.outputs.phase == 'review'
        run: |
          echo "🔄 Generating pairs trading signals (161 pairs, v2)..."
          python scripts/pipeline/generate_pairs_signals.py
        timeout-minutes: 10

      - name: "[Review] Monthly pair health check"
        id: pair_health
        if: steps.exec_mode.outputs.phase == 'review'
        run: |
          if python scripts/check_last_trading_day_of_month.py; then
            echo "月末営業日: pair health check実行"
            python scripts/analysis/pair_health_check.py
            echo "ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "月末ではない: スキップ"
            echo "ran=false" >> "$GITHUB_OUTPUT"
          fi
        timeout-minutes: 15

      - name: "[Review] Upload pair health check artifacts"
        if: steps.pair_health.outputs.ran == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pair-health-check
          path: |
            data/analysis/pair_health_*.csv
            docs/pair_health_*.html
          retention-days: 90

      - name: "[Review] Backtest Granville B4 archive"
        if: steps.exec_mode.outputs.phase == 'review'
        run: |
          echo "📊 Regenerating Granville B4 backtest archive (6Y)..."
          python scripts/pipeline/backtest_granville_b1b4.py 6
        timeout-minutes: 30

      - name: "[Review] Regenerate manifest.json (local only)"
        if: steps.exec_mode.outputs.phase == 'review'
        run: |
          # signals.parquet / positions.parquet 更新後の manifest 再生成
          # update_manifest.py は S3 cleanup も行うので、manifest生成関数のみ呼ぶ
          python -c "
          import sys
          sys.path.insert(0, '.')
          from scripts.pipeline.update_manifest import generate_manifest, save_manifest
          manifest = generate_manifest()
          save_manifest(manifest)
          "
        timeout-minutes: 5

      - name: "[Review] Upload review results to S3"
        if: steps.exec_mode.outputs.phase == 'review'
        run: |
          echo "☁️ Uploading review results..."

          # unified signals/positions (granville + pairs)
          for f in signals.parquet positions.parquet; do
            [ -f "data/parquet/$f" ] && aws s3 cp "data/parquet/$f" "s3://$S3_BUCKET/${S3_PREFIX}$f" --only-show-errors
          done

          # Calendar prices (SQ-4/SQ+1戦略用)
          for f in prices_topix500_oc.parquet etf_1306_prices.parquet; do
            [ -f "data/parquet/$f" ] && aws s3 cp "data/parquet/$f" "s3://$S3_BUCKET/${S3_PREFIX}$f" --only-show-errors
          done

          # granville prices_topix (指数・TOPIXベンチマーク用)
          [ -f "data/parquet/granville/prices_topix.parquet" ] && \
            aws s3 cp "data/parquet/granville/prices_topix.parquet" \
              "s3://$S3_BUCKET/${S3_PREFIX}granville/prices_topix.parquet" --only-show-errors

          # B4 backtest archive
          [ -f "data/parquet/backtest/granville_b1b4_archive.parquet" ] && \
            aws s3 cp "data/parquet/backtest/granville_b1b4_archive.parquet" \
              "s3://$S3_BUCKET/${S3_PREFIX}backtest/granville_b1b4_archive.parquet" --only-show-errors

          # production S3から取得済みファイル → staging S3に同期
          for f in hold_stocks.parquet \
                   nikkei_vi_max_1d.parquet index_prices_max_1d.parquet futures_prices_max_1d.parquet; do
            [ -f "data/parquet/$f" ] && aws s3 cp "data/parquet/$f" "s3://$S3_BUCKET/${S3_PREFIX}$f" --only-show-errors
          done

          # manifest
          [ -f "data/parquet/manifest.json" ] && aws s3 cp "data/parquet/manifest.json" "s3://$S3_BUCKET/${S3_PREFIX}manifest.json" --only-show-errors

          echo "✅ Review results uploaded"

      # ===== 22:00 準備フェーズ =====
      - name: "[Prepare] Generate Granville recommendations"
        if: steps.exec_mode.outputs.phase == 'prepare'
        run: |
          echo "📋 Generating recommendations for tomorrow..."
          python scripts/pipeline/generate_granville_recommendation.py
        timeout-minutes: 10

      - name: "[Prepare] Generate SQ-4 picks"
        if: steps.exec_mode.outputs.phase == 'prepare'
        run: |
          echo "📋 Generating SQ-4 picks (外需×5日ret worst10)..."
          python scripts/pipeline/generate_sq4_picks.py
        timeout-minutes: 5

      - name: "[Prepare] Generate SQ+1 trades"
        if: steps.exec_mode.outputs.phase == 'prepare'
        run: |
          echo "📋 Generating SQ+1 trades (SQ翌営業日ショート)..."
          python scripts/pipeline/generate_sq_plus1_trades.py
        timeout-minutes: 5

      - name: "[Prepare] Generate Weekday Edge trades"
        if: steps.exec_mode.outputs.phase == 'prepare'
        run: |
          echo "📋 Generating Weekday Edge trades (曜日×USフィルタ)..."
          python scripts/pipeline/generate_weekday_edge_trades.py
        timeout-minutes: 5

      - name: "[Prepare] Regenerate calendar.parquet"
        if: steps.exec_mode.outputs.phase == 'prepare'
        run: |
          echo "📅 Regenerating calendar.parquet..."
          python scripts/pipeline/generate_calendar.py
        timeout-minutes: 5

      - name: "[Prepare] Update all_stocks (grok + signals.parquet全戦略)"
        if: steps.exec_mode.outputs.phase == 'prepare'
        run: |
          echo "🔄 Updating all_stocks.parquet (grok + granville + pairs + sq_plus1 + sq4 + weekday)..."
          python scripts/pipeline/create_all_stocks.py
        timeout-minutes: 5

      - name: "[Prepare] Fetch prices for all_stocks (6 types)"
        if: steps.exec_mode.outputs.phase == 'prepare'
        run: |
          echo "📈 Fetching 6 price types for all_stocks..."
          python scripts/pipeline/fetch_prices.py
        timeout-minutes: 20

      - name: "[Prepare] Update manifest.json"
        if: steps.exec_mode.outputs.phase == 'prepare'
        run: |
          echo "📋 Regenerating manifest.json for prepare phase..."
          python scripts/pipeline/update_manifest.py
        timeout-minutes: 3

      - name: "[Prepare] Upload prepare results to S3"
        if: steps.exec_mode.outputs.phase == 'prepare'
        run: |
          echo "☁️ Uploading prepare results..."

          # all_stocks & signals & prices & calendar
          for f in all_stocks.parquet signals.parquet tech_snapshot_1d.parquet manifest.json calendar.parquet \
                   prices_max_1d.parquet prices_max_1mo.parquet prices_5d_1m.parquet \
                   prices_60d_15m.parquet prices_60d_5m.parquet prices_730d_1h.parquet; do
            [ -f "data/parquet/$f" ] && aws s3 cp "data/parquet/$f" "s3://$S3_BUCKET/${S3_PREFIX}$f" --only-show-errors
          done

          # Calendar Trades JSON (sq4 + sq_plus1 + weekday_edge)
          for f in sq4_trades.json sq_plus1_trades.json weekday_edge_trades.json; do
            [ -f "data/analysis/$f" ] && \
              aws s3 cp "data/analysis/$f" "s3://$S3_BUCKET/analysis/$f" --only-show-errors
          done

          # production S3から取得済みファイル → staging S3に同期
          for f in hold_stocks.parquet \
                   nikkei_vi_max_1d.parquet index_prices_max_1d.parquet futures_prices_max_1d.parquet; do
            [ -f "data/parquet/$f" ] && aws s3 cp "data/parquet/$f" "s3://$S3_BUCKET/${S3_PREFIX}$f" --only-show-errors
          done

          echo "✅ Prepare results uploaded"

      # ===== App Runner デプロイ（22:00のみ） =====
      - name: "[Prepare] Wait for App Runner RUNNING + Deploy"
        if: steps.exec_mode.outputs.phase == 'prepare'
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service --service-arn "$APP_RUNNER_ARN" --query 'Service.Status' --output text)
            echo "App Runner status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              break
            elif [ "$STATUS" = "PAUSED" ]; then
              echo "▶️ Resuming App Runner..."
              aws apprunner resume-service --service-arn "$APP_RUNNER_ARN"
            fi
            echo "⏳ Waiting... ($i/60)"
            sleep 10
          done
          echo "🚀 Starting App Runner deployment..."
          aws apprunner start-deployment --service-arn "$APP_RUNNER_ARN"
          echo "✅ Deployment started"

      # ===== 07:00 CME更新フェーズ =====
      - name: "[CME] Update CME close"
        if: steps.exec_mode.outputs.phase == 'cme_update'
        run: |
          echo "🌅 Updating CME close..."
          # staging S3から当日VI同期（18:00 fetchで保存済み）
          aws s3 cp "s3://$S3_BUCKET/${S3_PREFIX}nikkei_vi_max_1d.parquet" "data/parquet/nikkei_vi_max_1d.parquet" --only-show-errors || true
          aws s3 cp "s3://$S3_BUCKET/${S3_PREFIX}futures_prices_max_1d.parquet" "data/parquet/futures_prices_max_1d.parquet" --only-show-errors || true
          python scripts/pipeline/update_cme_close.py
          [ -f "data/parquet/futures_prices_max_1d.parquet" ] && \
            aws s3 cp "data/parquet/futures_prices_max_1d.parquet" "s3://$S3_BUCKET/${S3_PREFIX}futures_prices_max_1d.parquet" --only-show-errors
        timeout-minutes: 5

      - name: "[CME] Generate B4 Slack section"
        if: steps.exec_mode.outputs.phase == 'cme_update'
        run: |
          python scripts/format_granville_b4_slack.py
        timeout-minutes: 5

      - name: "[CME] Pre-market allocation (risk control)"
        if: steps.exec_mode.outputs.phase == 'cme_update'
        run: |
          echo "🛡️ Running pre-market allocator..."
          python scripts/pipeline/generate_pre_market_allocation.py
          [ -f "data/parquet/allocation.parquet" ] && \
            aws s3 cp "data/parquet/allocation.parquet" "s3://$S3_BUCKET/${S3_PREFIX}allocation.parquet" --only-show-errors
        timeout-minutes: 5

      # ===== 07:00 Live Trading 判定 (sox_research/live_trading) =====
      - name: "[CME] Download live_trading data from S3"
        if: steps.exec_mode.outputs.phase == 'cme_update'
        run: |
          echo "📥 Syncing live_trading state from S3..."
          for f in signals_log.csv trades.csv earnings_dates.json; do
            aws s3 cp "s3://$S3_BUCKET/live_trading/$f" \
              "sox_research/live_trading/$f" --only-show-errors 2>/dev/null \
              && echo "  ✓ $f" \
              || echo "  ⚠ $f not in S3 (initial run?)"
          done

      - name: "[CME] Live Trading signal check"
        if: steps.exec_mode.outputs.phase == 'cme_update'
        run: |
          echo "📊 Live Trading signal check..."
          python scripts/pipeline/live_trading_check.py
        timeout-minutes: 5

      - name: "[CME] Upload live_trading data to S3"
        if: steps.exec_mode.outputs.phase == 'cme_update'
        run: |
          echo "☁️ Uploading live_trading state to S3..."
          for f in signals_log.csv trades.csv earnings_dates.json; do
            if [ -f "sox_research/live_trading/$f" ]; then
              aws s3 cp "sox_research/live_trading/$f" \
                "s3://$S3_BUCKET/live_trading/$f" --only-show-errors \
                && echo "  ✓ $f"
            fi
          done

      - name: "[CME] Slack notification (live_trading)"
        if: steps.exec_mode.outputs.phase == 'cme_update'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_INCOMING_WEBHOOK_URL }}
        run: |
          if [ -f /tmp/live_trading_slack.json ] && [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data @/tmp/live_trading_slack.json "$SLACK_WEBHOOK_URL" \
              && echo "✅ Live Trading Slack posted"
          else
            echo "⚠ Slack payload or webhook missing, skipping"
          fi

      # ===== Slack通知（全フェーズ共通） =====
      - name: Generate B4 Slack section
        if: steps.exec_mode.outputs.phase == 'review' || steps.exec_mode.outputs.phase == 'prepare'
        run: |
          # staging S3からVI同期（Slack通知用、18:00 fetchで保存済み）
          aws s3 cp "s3://$S3_BUCKET/${S3_PREFIX}nikkei_vi_max_1d.parquet" "data/parquet/nikkei_vi_max_1d.parquet" --only-show-errors || true
          python scripts/format_granville_b4_slack.py || true
        timeout-minutes: 5

      - name: Slack notification (success)
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_INCOMING_WEBHOOK_URL }}
        run: |
          PHASE="${{ steps.exec_mode.outputs.phase }}"
          TIME=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            TEXT="✅ *Staging Pipeline Succeeded* ($PHASE)\n$TIME"
            if [ -f /tmp/granville_b4_section.txt ]; then
              B4_TEXT=$(python3 -c "
          import json
          with open('/tmp/granville_b4_section.txt') as f:
              blocks = json.load(f)
          parts = []
          for b in blocks:
              t = b.get('text', {}).get('text', '')
              if t: parts.append(t)
          print('\n'.join(parts))
          " 2>/dev/null || echo "")
              if [ -n "$B4_TEXT" ]; then
                TEXT="$TEXT\n\n$B4_TEXT"
              fi
            fi
            if [ -f /tmp/allocation_summary.json ]; then
              ALLOC_TEXT=$(python3 -c "
          import json
          with open('/tmp/allocation_summary.json') as f:
              s = json.load(f)
          lines = ['🛡️ *寄前アロケータ* (' + s.get('target_date', '?') + ')']
          vi = s.get('vi_close')
          if vi is not None:
              lines.append(f'  VI: {vi:.1f} ({s.get(\"vi_regime\", \"?\")})')
          dd20 = s.get('dd_20d_pct')
          if dd20 is not None:
              lines.append(f'  20日DD: {dd20*100:.1f}%')
          cme = s.get('cme_change_pct')
          if cme is not None:
              lines.append(f'  CME Gap: {cme:+.2f}%')
          lc = s.get('level_counts', {})
          if lc:
              parts = [f'{k}:{v}' for k, v in lc.items()]
              lines.append('  判定: ' + ' / '.join(parts))
          for w in s.get('warnings', []):
              lines.append(f'  ⚠ {w}')
          print('\n'.join(lines))
          " 2>/dev/null || echo "")
              if [ -n "$ALLOC_TEXT" ]; then
                TEXT="$TEXT\n\n$ALLOC_TEXT"
              fi
            fi
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"$TEXT\"}" "$SLACK_WEBHOOK_URL" || true
          fi

      - name: Slack notification (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_INCOMING_WEBHOOK_URL }}
        run: |
          PHASE="${{ steps.exec_mode.outputs.phase }}"
          TIME=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ *Staging Pipeline Failed* ($PHASE) $TIME\n<$RUN_URL|View Run>\"}" \
              "$SLACK_WEBHOOK_URL" || true
          fi

      # ===== サマリー =====
      - name: Pipeline summary
        if: always()
        run: |
          echo "=========================================="
          echo "Pipeline Summary"
          echo "=========================================="
          echo "Phase: ${{ steps.exec_mode.outputs.phase }}"
          echo "Time: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')"

          if [ -f "data/parquet/signals.parquet" ]; then
            echo "Signals: data/parquet/signals.parquet ($(wc -c < data/parquet/signals.parquet) bytes)"
          fi
          if [ -f "data/parquet/positions.parquet" ]; then
            echo "Positions: data/parquet/positions.parquet ($(wc -c < data/parquet/positions.parquet) bytes)"
          fi
          if ls data/parquet/granville/recommendations_*.parquet >/dev/null 2>&1; then
            echo "Recommendations: $(ls data/parquet/granville/recommendations_*.parquet | tail -1)"
          fi

          echo "=========================================="
