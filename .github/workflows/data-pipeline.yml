name: Data Pipeline

on:
  schedule:
    # 毎日23時（JST）に実行（土日祝含む）
    # Grok選定は材料の鮮度が重要なため、毎日実行
    # GitHub Actions cron は常にUTC時刻で指定
    # JST = UTC + 9時間 の変換を厳守
    - cron: "45 7 * * *" # UTC 07:45 = JST 16:45 (当日) - 株価データ更新のみ（TOPIX系16:30更新後）
    - cron: "0 14 * * *" # UTC 14:00 = JST 23:00 (当日) - Grok選定 + 株価データ更新
  workflow_dispatch:
    inputs:
      skip_trading_day_check:
        description: "営業日チェックをスキップ（スケジュールに関係なく強制実行）"
        type: boolean
        default: false
      force_meta_jquants:
        description: "meta_jquants.parquetを強制更新（7日間の鮮度チェックを無視）"
        type: boolean
        default: false
      force_grok:
        description: "Grok銘柄選定を強制実行（generate_grok_trending.pyを実行）"
        type: boolean
        default: false
      force_1645_mode:
        description: "16:45モードを強制（Grok選定スキップ、バックテスト実行）"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    environment: AWS_OIDC

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
      S3_BUCKET: ${{ vars.DATA_BUCKET || vars.S3_BUCKET }}
      S3_PREFIX: ${{ vars.PARQUET_PREFIX || 'parquet/' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup J-Quants authentication
        run: |
          # Create .env.jquants for J-Quants API v2 authentication
          cat > .env.jquants <<EOF
          JQUANTS_API_KEY=${{ secrets.JQUANTS_API_KEY }}
          EOF

          echo "✅ J-Quants v2 authentication configured"

      - name: Force execution notice
        if: ${{ github.event.inputs.skip_trading_day_check == 'true' }}
        run: |
          echo "⚠️  FORCE EXECUTION MODE"
          echo "Trading day check has been bypassed via manual dispatch"
          echo "Pipeline will run regardless of schedule"

      - name: Determine execution mode
        id: exec_mode
        run: |
          CURRENT_HOUR=$(TZ=Asia/Tokyo date +%H)
          echo "Current hour (JST): $CURRENT_HOUR"

          # force_1645_mode が true の場合、強制的に16:45モード（Grok選定スキップ）
          if [ "${{ github.event.inputs.force_1645_mode }}" = "true" ]; then
            echo "mode=stock_data_forced" >> $GITHUB_OUTPUT
            echo "skip_trading_check=true" >> $GITHUB_OUTPUT
            echo "skip_grok=true" >> $GITHUB_OUTPUT
            echo "💹 FORCED 16:45 Mode - Grok selection SKIPPED, backtest ENABLED"
          # force_grok が true の場合、強制的にGROKモード
          elif [ "${{ github.event.inputs.force_grok }}" = "true" ]; then
            echo "mode=grok_forced" >> $GITHUB_OUTPUT
            echo "skip_trading_check=true" >> $GITHUB_OUTPUT
            echo "skip_grok=false" >> $GITHUB_OUTPUT
            echo "🚀 FORCED GROK Mode - Manual GROK selection execution"
          # 23時（14:00 UTC）の実行はGROKモード（営業日チェックなし、Grok選定実行）
          elif [ "$CURRENT_HOUR" = "23" ]; then
            echo "mode=grok_daily" >> $GITHUB_OUTPUT
            echo "skip_trading_check=true" >> $GITHUB_OUTPUT
            echo "skip_grok=false" >> $GITHUB_OUTPUT
            echo "📊 GROK Daily Mode (23:00 JST) - Grok selection enabled"
          else
            echo "mode=stock_data" >> $GITHUB_OUTPUT
            echo "skip_trading_check=false" >> $GITHUB_OUTPUT
            echo "skip_grok=true" >> $GITHUB_OUTPUT
            echo "💹 Stock Data Mode (16:45 JST) - Grok selection skipped"
          fi

      - name: Check trading day window
        id: check_trading
        if: ${{ github.event.inputs.skip_trading_day_check != 'true' && steps.exec_mode.outputs.skip_trading_check != 'true' }}
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          echo "🔍 Checking if within trading day execution window..."
          python scripts/check_trading_day.py
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Within execution window (16:45-02:00 JST on trading day)"
          else
            echo "❌ Outside execution window or non-trading day"
          fi

          exit $EXIT_CODE

      - name: Check next day is trading day (for 23:00 run)
        id: check_next_trading
        if: (steps.exec_mode.outputs.mode == 'grok_daily' || steps.exec_mode.outputs.mode == 'grok_forced') && github.event.inputs.skip_trading_day_check != 'true'
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          echo "🔍 Checking if next day is a trading day..."
          python scripts/check_next_day_trading.py
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Next day is a TRADING day - will execute Grok selection"
          else
            echo "❌ Next day is NOT a trading day - skipping Grok selection"
            echo "::notice::Skipping Grok selection - next day is not a trading day"
          fi

          exit $EXIT_CODE

      - name: Skip if outside trading window
        if: |
          steps.check_updated.outputs.already_updated == 'true'
        run: |
          echo "::notice::Skipping pipeline execution - already updated today"
          exit 0

      - name: Verify S3 backups before Grok selection
        id: verify_backup
        if: success() && steps.exec_mode.outputs.mode == 'grok_daily' && github.event_name != 'workflow_dispatch'
        env:
          S3_BUCKET: ${{ env.S3_BUCKET }}
        run: |
          echo "🔍 Verifying S3 backups before Grok selection..."
          echo "============================================================"

          # verify_grok_backup.py は --date を省略すると
          # 自動的に grok_trending.parquet から日付を読み取る
          python3 scripts/verify_grok_backup.py --bucket "$S3_BUCKET"
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ S3 backups verified successfully"
            echo "backup_verified=true" >> $GITHUB_OUTPUT
          else
            echo "❌ S3 backup verification failed"
            echo "⚠️  Aborting Grok selection to prevent data loss"
            exit 1
          fi

      - name: Cleanup grok_trending before selection
        if: success() && steps.exec_mode.outputs.mode == 'grok_daily' && github.event_name != 'workflow_dispatch'
        run: |
          echo "🧹 Cleaning up grok_trending.parquet on S3..."
          echo "============================================================"

          # cleanup_grok_trending.py がS3から読み込み・アップロードするので、無条件に実行
          python3 scripts/cleanup_grok_trending.py
          if [ $? -eq 0 ]; then
            echo "✅ Cleanup completed successfully"
          else
            echo "❌ Cleanup failed"
            exit 1
          fi

      - name: Run Data Pipeline
        id: pipeline
        if: |
          success() && (
            steps.exec_mode.outputs.mode == 'stock_data' ||
            steps.exec_mode.outputs.mode == 'stock_data_forced' ||
            steps.check_next_trading.conclusion == 'success' ||
            steps.check_next_trading.conclusion == 'skipped'
          )
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          FORCE_META_UPDATE: ${{ steps.check_trading.outputs.force_meta_update }}
          SKIP_GROK_GENERATION: ${{ steps.exec_mode.outputs.skip_grok }}
          PROMPT_VERSION: v1_2_increased_selection
          ALLOW_GROK_API: "1"
        run: |
          # Create .env.xai for Grok API
          echo "XAI_API_KEY=$XAI_API_KEY" > .env.xai

          echo "============================================================"
          echo "Data Pipeline Execution (GitHub Actions)"
          echo "Started at: $(TZ=Asia/Tokyo date +"%Y-%m-%d %H:%M:%S JST")"
          echo "============================================================"
          echo ""
          echo "Environment variables:"
          echo "  S3_BUCKET=${{ env.S3_BUCKET }}"
          echo "  PARQUET_PREFIX=${{ env.S3_PREFIX }}"
          echo "  AWS_REGION=${{ env.AWS_REGION }}"
          echo "  FORCE_META_UPDATE=$FORCE_META_UPDATE"
          echo "  SKIP_GROK_GENERATION=$SKIP_GROK_GENERATION"
          echo "  LATEST_TRADING_DAY=${{ steps.check_trading.outputs.latest_trading_day }}"
          echo ""

          # Force update flag for meta_jquants (manual trigger override)
          if [ "${{ github.event.inputs.force_meta_jquants }}" = "true" ]; then
            export FORCE_META_UPDATE=true
            echo "⚠️ Manual force update enabled for meta_jquants.parquet"
          fi

          # 取引制限データをダウンロード（23:00 Grok選定用）
          echo "📥 Downloading trading restriction data for Grok selection..."
          mkdir -p data/parquet

          # 1. margin_code_master.parquet（S3から）
          if ! aws s3 cp "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}margin_code_master.parquet" "data/parquet/margin_code_master.parquet" --only-show-errors; then
            echo "❌ ERROR: Failed to download margin_code_master.parquet from S3"
            exit 1
          fi
          echo "✅ margin_code_master.parquet downloaded from S3"

          # 2. jsf_seigenichiran.csv（日証金サイト→S3フォールバック）
          JSF_URL="https://www.taisyaku.jp/data/seigenichiran.csv"
          JSF_PATH="data/parquet/jsf_seigenichiran.csv"
          echo "📥 Downloading JSF restrictions from $JSF_URL..."
          if curl -fsSL --connect-timeout 10 --max-time 30 "$JSF_URL" -o "$JSF_PATH" 2>/dev/null; then
            # Shift-JIS → UTF-8 変換
            if command -v iconv &> /dev/null; then
              iconv -f SHIFT-JIS -t UTF-8 "$JSF_PATH" > "${JSF_PATH}.tmp" && mv "${JSF_PATH}.tmp" "$JSF_PATH"
            fi
            echo "✅ JSF restrictions downloaded from 日証金 (latest)"
          else
            echo "⚠️ Failed to download from 日証金, using S3 fallback..."
            if ! aws s3 cp "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}jsf_seigenichiran.csv" "$JSF_PATH" --only-show-errors; then
              echo "❌ ERROR: Failed to download jsf_seigenichiran.csv from S3 fallback"
              exit 1
            fi
            echo "✅ JSF restrictions downloaded from S3 (fallback)"
          fi

          # Run the NEW pipeline (scalping skip + Grok)
          # Old pipeline (with scalping): python scripts/run_pipeline.py
          python scripts/run_pipeline_scalping_skip_add_grok.py
          EXIT_CODE=$?

          echo ""
          echo "============================================================"
          echo "Pipeline completed with exit code: $EXIT_CODE"
          echo "============================================================"

          exit $EXIT_CODE

      - name: Generate trading recommendation (23:00 only)
        if: success() && steps.exec_mode.outputs.skip_grok == 'false'
        env:
          INPUT_GROK_TRENDING: data/parquet/grok_trending.parquet
          OUTPUT_RECOMMENDATION_JSON: data/parquet/backtest/trading_recommendation.json
        run: |
          echo "============================================================"
          echo "Generating trading_recommendation.json (23:00 Grok selection)"
          echo "============================================================"

          mkdir -p data/parquet/backtest

          # 必須ファイルの存在確認
          echo "🔍 Checking required files..."
          if [ ! -f "data/parquet/prices_max_1d.parquet" ]; then
            echo "❌ ERROR: prices_max_1d.parquet not found (required for v2.1)"
            echo "This file should have been generated by the pipeline step"
            exit 1
          fi
          echo "✅ prices_max_1d.parquet exists"

          # S3からgrok_trending.parquetをダウンロード（23:00に生成されたもの）
          echo "📥 Downloading grok_trending.parquet from S3..."
          if ! aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_trending.parquet" \
            data/parquet/grok_trending.parquet \
            --region ${{ env.AWS_REGION }} \
            --only-show-errors; then
            echo "❌ ERROR: Failed to download grok_trending.parquet from S3"
            exit 1
          fi
          echo "✅ Downloaded grok_trending.parquet"

          # 時価総額カラムを追加（選定日終値ベース）
          echo "📊 Adding market_cap to grok_trending.parquet..."
          python3 scripts/pipeline/add_market_cap_to_grok_trending.py
          if [ $? -eq 0 ]; then
            echo "✅ Added market_cap column"
            # 更新されたgrok_trending.parquetをS3にアップロード
            aws s3 cp \
              data/parquet/grok_trending.parquet \
              "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_trending.parquet" \
              --region ${{ env.AWS_REGION }} \
              --only-show-errors
            echo "✅ Uploaded updated grok_trending.parquet to S3"
          else
            echo "⚠️ Warning: Failed to add market_cap (continuing anyway)"
          fi

          # ML予測（prob_up, quintile）カラムを追加
          echo "🤖 Adding ML predictions (prob_up, quintile) to grok_trending.parquet..."

          # 必要なファイルをS3からダウンロード
          echo "📥 Downloading files for ML prediction..."

          # grok_prices_max_1d.parquet
          if ! aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_prices_max_1d.parquet" \
            data/parquet/grok_prices_max_1d.parquet \
            --only-show-errors; then
            echo "⚠️ Warning: grok_prices_max_1d.parquet not found in S3"
          fi

          # grok_trending_archive.parquet（generate_grok_prices_max_1d.py用）
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/grok_trending_archive.parquet" \
            data/parquet/backtest/grok_trending_archive.parquet \
            --only-show-errors || echo "⚠️ archive not found"

          # 新規銘柄の価格データを取得（grok_trendingの銘柄がgrok_prices_max_1dにない場合）
          echo "📊 Updating grok_prices_max_1d.parquet with new tickers..."
          python3 scripts/pipeline/generate_grok_prices_max_1d.py || echo "⚠️ Price update failed"

          # 更新されたgrok_prices_max_1d.parquetをS3にアップロード
          if [ -f "data/parquet/grok_prices_max_1d.parquet" ]; then
            aws s3 cp \
              data/parquet/grok_prices_max_1d.parquet \
              "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_prices_max_1d.parquet" \
              --only-show-errors
            echo "✅ Updated grok_prices_max_1d.parquet on S3"
          fi

          # MLモデルファイル
          mkdir -p models
          if ! aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}ml/grok_lgbm_model.pkl" \
            models/grok_lgbm_model.pkl \
            --only-show-errors; then
            echo "⚠️ Warning: ML model not found in S3"
          fi
          if ! aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}ml/grok_lgbm_meta.json" \
            models/grok_lgbm_meta.json \
            --only-show-errors; then
            echo "⚠️ Warning: ML meta not found in S3"
          fi

          # 市場データ（index, futures, currency）
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}index_prices_max_1d.parquet" \
            data/parquet/index_prices_max_1d.parquet \
            --only-show-errors || echo "⚠️ index_prices not found"
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}futures_prices_max_1d.parquet" \
            data/parquet/futures_prices_max_1d.parquet \
            --only-show-errors || echo "⚠️ futures_prices not found"
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}currency_prices_max_1d.parquet" \
            data/parquet/currency_prices_max_1d.parquet \
            --only-show-errors || echo "⚠️ currency_prices not found"

          # ML予測スクリプト実行
          python3 scripts/pipeline/add_ml_prediction_to_grok_trending.py
          if [ $? -eq 0 ]; then
            echo "✅ Added prob_up/quintile columns"
            # 更新されたgrok_trending.parquetをS3にアップロード
            aws s3 cp \
              data/parquet/grok_trending.parquet \
              "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_trending.parquet" \
              --region ${{ env.AWS_REGION }} \
              --only-show-errors
            echo "✅ Uploaded updated grok_trending.parquet (with ML predictions) to S3"
          else
            echo "⚠️ Warning: Failed to add ML predictions (continuing anyway)"
          fi

          # trading_recommendation.json を生成（v2.1ロジック - 2階建てアーキテクチャ）
          echo "📊 Generating trading_recommendation.json (v2.1 - 2階建てアーキテクチャ)..."
          python3 scripts/pipeline/generate_trading_recommendation_v2_1.py

          if [ $? -eq 0 ] && [ -f "data/parquet/backtest/trading_recommendation.json" ]; then
            echo "✅ Generated trading_recommendation.json"

            # S3にアップロード
            echo "📤 Uploading trading_recommendation.json to S3..."
            aws s3 cp \
              data/parquet/backtest/trading_recommendation.json \
              "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/trading_recommendation.json" \
              --region ${{ env.AWS_REGION }} \
              --only-show-errors
            echo "✅ Uploaded trading_recommendation.json to S3"
          else
            echo "❌ ERROR: Failed to generate trading_recommendation.json"
            exit 1
          fi

          echo "============================================================"

      - name: Update day trade list (23:00 only)
        if: success() && steps.exec_mode.outputs.skip_grok == 'false'
        env:
          S3_BUCKET: ${{ env.S3_BUCKET }}
          S3_PREFIX: ${{ env.S3_PREFIX }}
        run: |
          echo "============================================================"
          echo "Updating grok_day_trade_list.parquet (23:00 Grok selection)"
          echo "============================================================"

          # grok_trending.parquet は前のステップでダウンロード済み
          if [ ! -f "data/parquet/grok_trending.parquet" ]; then
            echo "❌ ERROR: grok_trending.parquet not found"
            exit 1
          fi

          # 銘柄追加スクリプトを実行
          # - S3から grok_day_trade_list.parquet をダウンロード
          # - 新規銘柄のみ追加（上書き厳禁）
          # - S3にアップロード
          python3 scripts/pipeline/update_day_trade_list.py

          if [ $? -eq 0 ]; then
            echo "✅ Day trade list updated successfully"
          else
            echo "⚠️ Day trade list update failed (non-critical)"
          fi

          echo "============================================================"

      - name: Generate Granville recommendations (23:00 only)
        if: success() && steps.exec_mode.outputs.skip_grok == 'false'
        run: |
          echo "============================================================"
          echo "Generating Granville recommendations (23:00 only)"
          echo "============================================================"

          mkdir -p data/parquet/granville

          # S3からgranville関連データをダウンロード
          for f in hold_stocks.parquet credit_status.parquet orders.parquet nikkei_vi_max_1d.parquet; do
            aws s3 cp "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}$f" "data/parquet/$f" --only-show-errors 2>/dev/null || true
          done

          # signals + positions を S3からダウンロード（16:45で生成済み）
          aws s3 sync "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}granville/" "data/parquet/granville/" --only-show-errors \
            --exclude "prices_topix.parquet" || true

          python3 scripts/pipeline/generate_granville_recommendation.py

          if [ $? -eq 0 ]; then
            echo "✅ Granville recommendations generated"
            for f in data/parquet/granville/recommendations_*.parquet; do
              [ -f "$f" ] && aws s3 cp "$f" "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}granville/$(basename $f)" --only-show-errors
            done
            echo "✅ Uploaded granville recommendations to S3"
          else
            echo "⚠️ Granville recommendations failed (non-critical)"
          fi
        timeout-minutes: 10

      - name: Run backtest and archive
        if: success() && steps.exec_mode.outputs.skip_grok == 'true'
        run: |
          echo "============================================================"
          echo "Running backtest and archiving results (16:45 only)"
          echo "============================================================"

          # S3から既存のアーカイブファイルをダウンロード
          mkdir -p data/parquet/backtest
          ARCHIVE_FILE="grok_trending_archive.parquet"
          S3_ARCHIVE_PATH="s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/$ARCHIVE_FILE"

          if aws s3 ls "$S3_ARCHIVE_PATH" > /dev/null 2>&1; then
            echo "📥 Downloading existing archive from S3..."
            aws s3 cp "$S3_ARCHIVE_PATH" "data/parquet/backtest/$ARCHIVE_FILE" --only-show-errors
            EXISTING_RECORDS=$(python -c "import pandas as pd; df=pd.read_parquet('data/parquet/backtest/$ARCHIVE_FILE'); print(len(df))")
            EXISTING_DATES=$(python -c "import pandas as pd; df=pd.read_parquet('data/parquet/backtest/$ARCHIVE_FILE'); print(df['backtest_date'].nunique())")
            echo "✅ Downloaded archive: $EXISTING_RECORDS records across $EXISTING_DATES days"
          else
            echo "ℹ️  No existing archive found in S3, will create new one"
          fi

          # 取引制限データをダウンロード（margin_code + 日証金制限）- 必須ファイル
          echo "📥 Downloading trading restriction data (required)..."

          # 1. margin_code_master.parquet（S3から）
          if ! aws s3 cp "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}margin_code_master.parquet" "data/parquet/margin_code_master.parquet" --only-show-errors; then
            echo "❌ ERROR: Failed to download margin_code_master.parquet from S3"
            exit 1
          fi
          echo "✅ margin_code_master.parquet downloaded from S3"

          # 2. jsf_seigenichiran.csv（日証金サイト→S3フォールバック）
          JSF_URL="https://www.taisyaku.jp/data/seigenichiran.csv"
          JSF_PATH="data/parquet/jsf_seigenichiran.csv"
          echo "📥 Downloading JSF restrictions from $JSF_URL..."
          if curl -fsSL --connect-timeout 10 --max-time 30 "$JSF_URL" -o "$JSF_PATH" 2>/dev/null; then
            # Shift-JIS → UTF-8 変換
            if command -v iconv &> /dev/null; then
              iconv -f SHIFT-JIS -t UTF-8 "$JSF_PATH" > "${JSF_PATH}.tmp" && mv "${JSF_PATH}.tmp" "$JSF_PATH"
            fi
            echo "✅ JSF restrictions downloaded from 日証金 (latest)"
          else
            echo "⚠️ Failed to download from 日証金, using S3 fallback..."
            if ! aws s3 cp "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}jsf_seigenichiran.csv" "$JSF_PATH" --only-show-errors; then
              echo "❌ ERROR: Failed to download jsf_seigenichiran.csv from S3 fallback"
              exit 1
            fi
            echo "✅ JSF restrictions downloaded from S3 (fallback)"
          fi

          # バックテストを実行（S3のGROK選定結果を使用）
          echo "Running backtest from S3 grok_trending.parquet..."
          python scripts/pipeline/save_backtest_to_archive.py

          if [ $? -eq 0 ]; then
            echo "✅ Backtest completed and archived"
          else
            echo "⚠️ Backtest failed (non-critical)"
          fi

          # d1-d5保持リターンをアーカイブに追記
          echo "Updating archive with d1-d5 holding returns..."
          python scripts/pipeline/update_archive_holding_returns.py

          echo "============================================================"

      - name: Extract data statistics
        id: stats
        if: success()
        run: |
          # meta_jquants statistics
          META_JQUANTS_COUNT=0
          if [ -f "data/parquet/meta_jquants.parquet" ]; then
            META_JQUANTS_COUNT=$(python -c "import pandas as pd; print(len(pd.read_parquet('data/parquet/meta_jquants.parquet')))")
          fi
          echo "meta_jquants_count=$META_JQUANTS_COUNT" >> $GITHUB_OUTPUT

          # grok_trending statistics (from S3)
          GROK_COUNT=0
          if aws s3 ls "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_trending.parquet" > /dev/null 2>&1; then
            mkdir -p data/parquet
            aws s3 cp "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_trending.parquet" data/parquet/grok_trending.parquet --only-show-errors
            GROK_COUNT=$(python -c "import pandas as pd; print(len(pd.read_parquet('data/parquet/grok_trending.parquet')))")
            rm -f data/parquet/grok_trending.parquet
          fi
          echo "grok_trending_count=$GROK_COUNT" >> $GITHUB_OUTPUT

          # grok_backtest_meta statistics (NEW)
          GROK_BACKTEST_EXISTS=false
          if [ -f "data/parquet/grok_backtest_meta.parquet" ]; then
            GROK_BACKTEST_EXISTS=true
          fi
          echo "grok_backtest_exists=$GROK_BACKTEST_EXISTS" >> $GITHUB_OUTPUT

          # grok_trending_archive statistics (NEW)
          ARCHIVE_TOTAL=0
          ARCHIVE_DATES=0
          if [ -f "data/parquet/backtest/grok_trending_archive.parquet" ]; then
            ARCHIVE_TOTAL=$(python -c "import pandas as pd; print(len(pd.read_parquet('data/parquet/backtest/grok_trending_archive.parquet')))")
            ARCHIVE_DATES=$(python -c "import pandas as pd; df=pd.read_parquet('data/parquet/backtest/grok_trending_archive.parquet'); print(df['backtest_date'].nunique())")
          fi
          echo "archive_total=$ARCHIVE_TOTAL" >> $GITHUB_OUTPUT
          echo "archive_dates=$ARCHIVE_DATES" >> $GITHUB_OUTPUT

          # scalping statistics (kept for compatibility, will be 0)
          ENTRY_COUNT=0
          ACTIVE_COUNT=0
          if [ -f "data/parquet/scalping_entry.parquet" ]; then
            ENTRY_COUNT=$(python -c "import pandas as pd; print(len(pd.read_parquet('data/parquet/scalping_entry.parquet')))")
          fi
          if [ -f "data/parquet/scalping_active.parquet" ]; then
            ACTIVE_COUNT=$(python -c "import pandas as pd; print(len(pd.read_parquet('data/parquet/scalping_active.parquet')))")
          fi
          echo "scalping_entry_count=$ENTRY_COUNT" >> $GITHUB_OUTPUT
          echo "scalping_active_count=$ACTIVE_COUNT" >> $GITHUB_OUTPUT

          # all_stocks statistics
          ALL_STOCKS_COUNT=0
          if [ -f "data/parquet/all_stocks.parquet" ]; then
            ALL_STOCKS_COUNT=$(python -c "import pandas as pd; print(len(pd.read_parquet('data/parquet/all_stocks.parquet')))")
          fi
          echo "all_stocks_count=$ALL_STOCKS_COUNT" >> $GITHUB_OUTPUT

          # prices statistics
          LATEST_DATE="N/A"
          if [ -f "data/parquet/prices_max_1d.parquet" ]; then
            LATEST_DATE=$(python -c "import pandas as pd; df=pd.read_parquet('data/parquet/prices_max_1d.parquet'); print(df['date'].max() if not df.empty else 'N/A')")
          fi
          echo "latest_price_date=$LATEST_DATE" >> $GITHUB_OUTPUT

          echo "📊 Statistics extracted:"
          echo "  - meta_jquants: $META_JQUANTS_COUNT stocks"
          echo "  - grok_trending: $GROK_COUNT stocks"
          echo "  - grok_archive: $ARCHIVE_TOTAL records across $ARCHIVE_DATES days"
          echo "  - scalping_entry: $ENTRY_COUNT stocks (skipped)"
          echo "  - scalping_active: $ACTIVE_COUNT stocks (skipped)"
          echo "  - all_stocks: $ALL_STOCKS_COUNT stocks"
          echo "  - latest_price_date: $LATEST_DATE"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: |
            data/parquet/*.parquet
            data/parquet/manifest.json
          if-no-files-found: warn
          retention-days: 7

      - name: Send Slack notification (skipped 02:00 JST)
        if: |
          github.event.schedule == '0 17 * * *' &&
          steps.check_updated.outputs.already_updated == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_INCOMING_WEBHOOK_URL }}
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          MESSAGE='{
            "text": "ℹ️ Data Pipeline Skipped (Already Updated)",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "ℹ️ *Data Pipeline Skipped*\nData already updated today (`'"${TODAY}"'`). Skipping 02:00 JST run."
                }
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`"},
                  {"type": "mrkdwn", "text": "*Trigger:*\n`02:00 JST scheduled run`"}
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Workflow Run"},
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }'
          curl -X POST -H 'Content-type: application/json' --data "$MESSAGE" "$SLACK_WEBHOOK_URL" || true

      - name: Archive GROK trending for backtest
        id: archive-grok
        if: success() && steps.exec_mode.outputs.skip_grok == 'true'
        run: |
          # save_backtest_to_archive.py が grok_trending_{DATE}.parquet を生成するため、
          # ここでのアーカイブは不要になりました。このステップはスキップします。
          echo "ℹ️  Archiving is handled by save_backtest_to_archive.py"

          if false; then
            # cron判定
            if [ "${{ github.event.schedule }}" = "45 7 * * *" ]; then
              RUN_TIME="16:45"
            elif [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
              RUN_TIME="23:00"
            else
              RUN_TIME="manual"
            fi

            echo "📦 Archiving GROK trending for backtest ($RUN_TIME run)..."

            # 日付取得（JST基準、YYYYMMDD形式）
            DATE=$(TZ=Asia/Tokyo date +%Y%m%d)
            BACKTEST_FILE="grok_trending_${DATE}.parquet"
            BACKTEST_DIR="data/parquet/backtest"

            echo "[INFO] Run time: $RUN_TIME"
            echo "[INFO] JST Date: $DATE"
            echo "[INFO] Backup file: $BACKTEST_FILE (will overwrite if exists)"

            # バックテストディレクトリ作成
            mkdir -p "$BACKTEST_DIR"

            # コピー
            cp "data/parquet/grok_trending.parquet" "$BACKTEST_DIR/$BACKTEST_FILE"
            echo "✅ Created: $BACKTEST_DIR/$BACKTEST_FILE"

            # S3にアップロード（上書き保存）
            aws s3 cp "$BACKTEST_DIR/$BACKTEST_FILE" \
              "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/$BACKTEST_FILE" \
              --region ${{ env.AWS_REGION }}
            echo "✅ Uploaded to S3: s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/$BACKTEST_FILE"

            echo "✅ Backtest archiving completed"
          else
            echo "⚠️  grok_trending.parquet not found, skipping backtest archive"
          fi

      - name: Update Granville prices (TOPIX daily)
        if: success() && steps.exec_mode.outputs.skip_grok == 'true'
        run: |
          echo "============================================================"
          echo "Updating Granville TOPIX prices (16:45 only)"
          echo "============================================================"

          mkdir -p data/parquet/granville

          # S3からprices_topix.parquetをダウンロード
          if aws s3 ls "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}granville/prices_topix.parquet" > /dev/null 2>&1; then
            echo "📥 Downloading prices_topix.parquet from S3..."
            aws s3 cp \
              "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}granville/prices_topix.parquet" \
              "data/parquet/granville/prices_topix.parquet" --only-show-errors
          fi

          python3 scripts/pipeline/update_granville_prices.py

          if [ $? -eq 0 ]; then
            echo "✅ Granville prices updated"
          else
            echo "⚠️ Granville prices update failed (non-critical)"
          fi
        timeout-minutes: 45

      - name: Generate Granville B1-B4 signals
        if: success() && steps.exec_mode.outputs.skip_grok == 'true'
        run: |
          echo "============================================================"
          echo "Generating Granville B1-B4 signals (16:45 only)"
          echo "============================================================"

          # S3からgranville関連データをダウンロード
          for f in hold_stocks.parquet credit_status.parquet orders.parquet nikkei_vi_max_1d.parquet; do
            if aws s3 ls "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}$f" > /dev/null 2>&1; then
              aws s3 cp "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}$f" "data/parquet/$f" --only-show-errors
            fi
          done

          python3 scripts/pipeline/generate_granville_signals.py

          if [ $? -eq 0 ]; then
            echo "✅ Granville B1-B4 signal generation completed"
            # signals + positions を S3にアップロード
            for f in data/parquet/granville/signals_*.parquet data/parquet/granville/positions_*.parquet; do
              [ -f "$f" ] && aws s3 cp "$f" "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}granville/$(basename $f)" --only-show-errors
            done
            echo "✅ Uploaded granville signals/positions to S3"
          else
            echo "⚠️ Granville signal generation failed (non-critical)"
          fi
        timeout-minutes: 30

      - name: Backtest Granville B1-B4 archive
        if: success() && steps.exec_mode.outputs.skip_grok == 'true'
        run: |
          echo "============================================================"
          echo "Backtesting Granville B1-B4 archive (16:45 only)"
          echo "============================================================"

          python3 scripts/pipeline/backtest_granville_b1b4.py

          if [ $? -eq 0 ]; then
            echo "✅ Granville B1-B4 backtest completed"
          else
            echo "⚠️ Granville B1-B4 backtest failed (non-critical)"
          fi

      - name: Format Granville Slack notification
        if: success() && steps.exec_mode.outputs.skip_grok == 'true'
        run: |
          python3 scripts/format_granville_b4_slack.py || true

      - name: Generate market anomaly data (last trading day of week)
        if: success() && steps.exec_mode.outputs.skip_grok == 'true'
        run: |
          # 週の最終営業日かどうかを判定（J-Quantsカレンダー基準）
          if ! python3 scripts/check_last_trading_day_of_week.py; then
            echo "ℹ️  Not the last trading day of the week. Skipping market anomaly generation."
            exit 0
          fi

          echo "============================================================"
          echo "📊 Generating market anomaly data (last trading day 16:45)"
          echo "============================================================"

          python3 scripts/pipeline/generate_market_anomaly.py

          if [ $? -eq 0 ]; then
            echo "✅ Market anomaly generation completed"
          else
            echo "⚠️ Market anomaly generation failed (non-critical)"
          fi

      - name: ML Model Retraining (last trading day of week)
        if: success() && steps.exec_mode.outputs.skip_grok == 'true'
        run: |
          # 週の最終営業日かどうかを判定（J-Quantsカレンダー基準）
          if ! python3 scripts/check_last_trading_day_of_week.py; then
            echo "ℹ️  Not the last trading day of the week. Skipping ML retraining."
            exit 0
          fi

          echo "============================================================"
          echo "🤖 ML Model Retraining (last trading day 16:45)"
          echo "============================================================"

          # === Step 1: 必要なデータをS3からダウンロード ===
          echo ""
          echo "📥 Step 1: Downloading required data from S3..."

          # grok_trending_archive.parquet
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/grok_trending_archive.parquet" \
            data/parquet/backtest/grok_trending_archive.parquet \
            --only-show-errors
          echo "  ✅ grok_trending_archive.parquet"

          # grok_prices_max_1d.parquet（S3に存在しない場合はStep 2で再生成）
          if aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_prices_max_1d.parquet" \
            data/parquet/grok_prices_max_1d.parquet \
            --only-show-errors 2>/dev/null; then
            echo "  ✅ grok_prices_max_1d.parquet"
          else
            echo "  ⚠️ grok_prices_max_1d.parquet not found in S3 (will be generated in Step 2)"
          fi

          # index_prices_max_1d.parquet
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}index_prices_max_1d.parquet" \
            data/parquet/index_prices_max_1d.parquet \
            --only-show-errors
          echo "  ✅ index_prices_max_1d.parquet"

          # futures_prices_max_1d.parquet
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}futures_prices_max_1d.parquet" \
            data/parquet/futures_prices_max_1d.parquet \
            --only-show-errors
          echo "  ✅ futures_prices_max_1d.parquet"

          # currency_prices_max_1d.parquet
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}currency_prices_max_1d.parquet" \
            data/parquet/currency_prices_max_1d.parquet \
            --only-show-errors
          echo "  ✅ currency_prices_max_1d.parquet"

          # === Step 2: grok_prices_max_1d.parquet を更新 ===
          echo ""
          echo "📊 Step 2: Updating grok_prices_max_1d.parquet..."
          python3 scripts/pipeline/generate_grok_prices_max_1d.py

          if [ $? -eq 0 ]; then
            echo "  ✅ grok_prices_max_1d.parquet updated"
            # S3にアップロード
            aws s3 cp \
              data/parquet/grok_prices_max_1d.parquet \
              "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_prices_max_1d.parquet" \
              --only-show-errors
            echo "  ✅ Uploaded to S3"
          else
            echo "  ⚠️ Failed to update grok_prices_max_1d.parquet (continuing with existing data)"
          fi

          # === Step 3: 特徴量生成 ===
          echo ""
          echo "📊 Step 3: Generating features..."
          mkdir -p data/parquet/ml
          python3 scripts/ml/feature_engineering.py

          if [ $? -eq 0 ]; then
            FEATURES_COUNT=$(python3 -c "import pandas as pd; df=pd.read_parquet('data/parquet/ml/archive_with_features.parquet'); print(len(df))")
            echo "  ✅ Generated features: $FEATURES_COUNT records"
          else
            echo "  ❌ Failed to generate features"
            exit 1
          fi

          # === Step 4: モデル学習 ===
          echo ""
          echo "🤖 Step 4: Training ML model..."
          mkdir -p models
          python3 scripts/ml/train_model.py

          if [ $? -eq 0 ]; then
            echo "  ✅ Model training completed"
          else
            echo "  ❌ Failed to train model"
            exit 1
          fi

          # === Step 5: モデルをS3にアップロード ===
          echo ""
          echo "📤 Step 5: Uploading model to S3..."

          aws s3 cp \
            models/grok_lgbm_model.pkl \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}ml/grok_lgbm_model.pkl" \
            --only-show-errors
          echo "  ✅ grok_lgbm_model.pkl"

          aws s3 cp \
            models/grok_lgbm_meta.json \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}ml/grok_lgbm_meta.json" \
            --only-show-errors
          echo "  ✅ grok_lgbm_meta.json"

          # 特徴量ファイルもアップロード
          aws s3 cp \
            data/parquet/ml/archive_with_features.parquet \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}ml/archive_with_features.parquet" \
            --only-show-errors
          echo "  ✅ archive_with_features.parquet"

          aws s3 cp \
            models/wfcv_predictions.parquet \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}ml/wfcv_predictions.parquet" \
            --only-show-errors
          echo "  ✅ wfcv_predictions.parquet"

          # archive（ml_gradeカラム追加済み）を再アップロード
          aws s3 cp \
            data/parquet/backtest/grok_trending_archive.parquet \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/grok_trending_archive.parquet" \
            --only-show-errors
          echo "  ✅ grok_trending_archive.parquet (with ml_grade)"

          echo ""
          echo "============================================================"
          echo "✅ ML Model Retraining completed!"
          echo "============================================================"

          # ML再学習結果のSlack通知セクション生成
          python3 scripts/format_ml_slack.py || true

      - name: Generate Grok Analysis Data
        if: success() && steps.exec_mode.outputs.skip_grok == 'true'
        run: |
          echo "📊 Generating Grok Analysis Data..."

          # 出力ディレクトリ作成
          mkdir -p data/parquet/backtest

          # === Step 1: S3から必要なファイルをダウンロード ===
          echo "📥 Downloading files from S3..."

          # grok_trending_*.parquet ファイルをダウンロード
          echo "  - Downloading grok_trending_*.parquet files..."
          aws s3 sync \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/" \
            data/parquet/backtest/ \
            --exclude "*" \
            --include "grok_trending_202*.parquet" \
            --only-show-errors

          GROK_FILES_COUNT=$(ls data/parquet/backtest/grok_trending_202*.parquet 2>/dev/null | wc -l)
          echo "  ✅ Downloaded $GROK_FILES_COUNT grok_trending files"

          # trading_recommendation.json をダウンロード（23:00に生成されたもの）
          echo "  - Downloading trading_recommendation.json (required)..."
          if ! aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/trading_recommendation.json" \
            data/parquet/backtest/trading_recommendation.json \
            --only-show-errors; then
            echo "  ❌ ERROR: trading_recommendation.json not found in S3"
            echo "  This file is required for merge_json_to_grok_analysis.py"
            echo "  Pipeline cannot proceed without this file"
            exit 1
          fi
          echo "  ✅ Downloaded trading_recommendation.json"

          # grok_trending.parquet (最新の選定結果) をダウンロード - 必須ファイル
          echo "  - Downloading grok_trending.parquet (required)..."
          if ! aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_trending.parquet" \
            data/parquet/grok_trending.parquet \
            --only-show-errors; then
            echo "  ❌ ERROR: Failed to download grok_trending.parquet from S3"
            echo "  This file should have been created by yesterday's 23:00 Grok selection"
            echo "  Pipeline cannot proceed without this file"
            exit 1
          fi
          echo "  ✅ Downloaded grok_trending.parquet"

          # grok_trending.parquetをbacktest/にもコピー（v2.1スクリプト用）
          echo "  📋 Copying grok_trending.parquet to backtest/ directory..."
          cp data/parquet/grok_trending.parquet data/parquet/backtest/grok_trending.parquet
          echo "  ✅ Copied to backtest/"

          # === Step 2: grok_analysis_merged.parquet の生成 ===
          echo ""
          echo "📊 Step 2: Generating grok_analysis_merged.parquet..."
          echo "  ℹ️  Using merge_json_to_grok_analysis.py (49 columns with v2.0.3 logic)"

          # S3から既存のgrok_analysis_merged.parquetをダウンロード
          ANALYSIS_FILE="grok_analysis_merged.parquet"
          S3_ANALYSIS_PATH="s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/$ANALYSIS_FILE"

          if aws s3 ls "$S3_ANALYSIS_PATH" > /dev/null 2>&1; then
            echo "  📥 Downloading existing grok_analysis_merged.parquet from S3..."
            aws s3 cp "$S3_ANALYSIS_PATH" "data/parquet/backtest/$ANALYSIS_FILE" --only-show-errors
            EXISTING_RECORDS=$(python3 -c "import pandas as pd; df=pd.read_parquet('data/parquet/backtest/$ANALYSIS_FILE'); print(len(df))")
            EXISTING_DATES=$(python3 -c "import pandas as pd; df=pd.read_parquet('data/parquet/backtest/$ANALYSIS_FILE'); print(df['backtest_date'].nunique())")
            echo "  ✅ Downloaded existing file: $EXISTING_RECORDS records across $EXISTING_DATES days"
          else
            echo "  ℹ️  No existing grok_analysis_merged.parquet found in S3, will create new one"
          fi

          python3 scripts/pipeline/merge_json_to_grok_analysis.py

          if [ $? -eq 0 ]; then
            RECORDS=$(python3 -c "import pandas as pd; df = pd.read_parquet('data/parquet/backtest/grok_analysis_merged.parquet'); print(len(df))")
            COLUMNS=$(python3 -c "import pandas as pd; df = pd.read_parquet('data/parquet/backtest/grok_analysis_merged.parquet'); print(len(df.columns))")
            echo "  ✅ Generated grok_analysis_merged.parquet ($RECORDS records, $COLUMNS columns)"
          else
            echo "  ❌ Failed to run merge_json_to_grok_analysis.py"
            exit 1
          fi

          # === Step 2.5: grok_analysis_merged_v2_1.parquet の生成 ===
          echo ""
          echo "📊 Step 2.5: Generating grok_analysis_merged_v2_1.parquet..."
          echo "  ℹ️  Using update_grok_analysis_merged_v2_1.py (61 columns with v2.1 logic)"

          # S3から既存のgrok_analysis_merged_v2_1.parquetをダウンロード
          ANALYSIS_V2_1_FILE="grok_analysis_merged_v2_1.parquet"
          S3_ANALYSIS_V2_1_PATH="s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/$ANALYSIS_V2_1_FILE"

          if aws s3 ls "$S3_ANALYSIS_V2_1_PATH" > /dev/null 2>&1; then
            echo "  📥 Downloading existing grok_analysis_merged_v2_1.parquet from S3..."
            aws s3 cp "$S3_ANALYSIS_V2_1_PATH" "data/parquet/backtest/$ANALYSIS_V2_1_FILE" --only-show-errors
            EXISTING_RECORDS_V2_1=$(python3 -c "import pandas as pd; df=pd.read_parquet('data/parquet/backtest/$ANALYSIS_V2_1_FILE'); print(len(df))")
            EXISTING_DATES_V2_1=$(python3 -c "import pandas as pd; df=pd.read_parquet('data/parquet/backtest/$ANALYSIS_V2_1_FILE'); print(df['backtest_date'].nunique())")
            echo "  ✅ Downloaded existing file: $EXISTING_RECORDS_V2_1 records across $EXISTING_DATES_V2_1 days"
          else
            echo "  ℹ️  No existing grok_analysis_merged_v2_1.parquet found in S3, will create new one"
          fi

          python3 scripts/pipeline/update_grok_analysis_merged_v2_1.py

          if [ $? -eq 0 ]; then
            RECORDS_V2_1=$(python3 -c "import pandas as pd; df = pd.read_parquet('data/parquet/backtest/grok_analysis_merged_v2_1.parquet'); print(len(df))")
            COLUMNS_V2_1=$(python3 -c "import pandas as pd; df = pd.read_parquet('data/parquet/backtest/grok_analysis_merged_v2_1.parquet'); print(len(df.columns))")
            echo "  ✅ Generated grok_analysis_merged_v2_1.parquet ($RECORDS_V2_1 records, $COLUMNS_V2_1 columns)"
          else
            echo "  ❌ Failed to run update_grok_analysis_merged_v2_1.py"
            exit 1
          fi

          # === Step 3: S3にアップロード ===
          echo ""
          echo "📤 Step 3: Uploading to S3..."

          # v2.0.3のアップロード
          if aws s3 cp \
            data/parquet/backtest/grok_analysis_merged.parquet \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/grok_analysis_merged.parquet" \
            --region ${{ env.AWS_REGION }} \
            --only-show-errors; then
            echo "  ✅ Uploaded grok_analysis_merged.parquet to S3"
          else
            echo "  ❌ ERROR: Failed to upload grok_analysis_merged.parquet to S3"
            exit 1
          fi

          # v2.1のアップロード
          if aws s3 cp \
            data/parquet/backtest/grok_analysis_merged_v2_1.parquet \
            "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/grok_analysis_merged_v2_1.parquet" \
            --region ${{ env.AWS_REGION }} \
            --only-show-errors; then
            echo "  ✅ Uploaded grok_analysis_merged_v2_1.parquet to S3"
          else
            echo "  ❌ ERROR: Failed to upload grok_analysis_merged_v2_1.parquet to S3"
            exit 1
          fi

          # ファイルサイズ確認
          FILE_SIZE=$(du -h data/parquet/backtest/grok_analysis_merged.parquet | cut -f1)
          echo ""
          echo "✅ Grok Analysis Data generation completed"
          echo "   File size: $FILE_SIZE"

      - name: Generate market report data
        if: success()
        run: |
          echo "============================================================"
          echo "📊 Generating market report data JSON"
          echo "============================================================"

          # 必要なparquetがなければS3からダウンロード
          for f in index_prices_max_1d topix_prices_max_1d currency_prices_max_1d \
                   nikkei_vi_max_1d sectors_prices_max_1d futures_prices_max_1d \
                   grok_trending market_anomaly; do
            FILE="data/parquet/${f}.parquet"
            if [ ! -f "$FILE" ]; then
              echo "  📥 Downloading ${f}.parquet from S3..."
              aws s3 cp "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}${f}.parquet" "$FILE" --only-show-errors || echo "  ⚠️ ${f}.parquet not found"
            fi
          done

          # backtest archive
          mkdir -p data/parquet/backtest
          if [ ! -f "data/parquet/backtest/grok_trending_archive.parquet" ]; then
            aws s3 cp "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}backtest/grok_trending_archive.parquet" \
              data/parquet/backtest/grok_trending_archive.parquet --only-show-errors || echo "  ⚠️ archive not found"
          fi

          python3 scripts/pipeline/generate_market_report_data.py

          if [ $? -eq 0 ]; then
            echo "✅ Market report data generated"
            # S3にアップロード
            REPORT_JSON=$(ls -t data/parquet/market_summary/structured/report_data_*.json 2>/dev/null | head -1)
            if [ -n "$REPORT_JSON" ]; then
              aws s3 cp "$REPORT_JSON" "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}market_summary/structured/$(basename $REPORT_JSON)" --only-show-errors
              echo "  📤 Uploaded $(basename $REPORT_JSON) to S3"
            fi
          else
            echo "⚠️ Market report data generation failed (non-critical)"
          fi

      - name: Check xAI billing
        if: success()
        env:
          XAI_MANAGEMENT_API_KEY: ${{ secrets.XAI_MANAGEMENT_API_KEY }}
          XAI_TEAM_ID: ${{ secrets.XAI_TEAM_ID }}
        run: |
          echo "💰 Checking xAI billing..."

          # Install requests if not already installed
          pip install requests 2>/dev/null || true

          # Run billing check script (outputs to /tmp/billing_section.txt)
          python3 scripts/check_xai_billing.py

          if [ $? -eq 0 ]; then
            echo "  ✅ xAI billing check completed"
          else
            echo "  ⚠️  xAI billing check failed (non-critical)"
          fi

      - name: Extract GROK stocks info
        id: grok-info
        if: success()
        run: |
          # GROK銘柄情報を抽出（S3からダウンロード）
          if aws s3 ls "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_trending.parquet" > /dev/null 2>&1; then
            mkdir -p data/parquet
            aws s3 cp "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}grok_trending.parquet" data/parquet/grok_trending.parquet --only-show-errors

            GROK_INFO=$(python3 -c '
          import pandas as pd
          import json

          df = pd.read_parquet("data/parquet/grok_trending.parquet")

          if df.empty:
              print("")
              exit(0)

          # selected_time別の集計
          time_counts = df["selected_time"].value_counts().to_dict() if "selected_time" in df.columns else {}

          # 銘柄リスト生成（全銘柄）
          stocks_list = []
          for _, row in df.iterrows():
              ticker = row.get("ticker", "")
              stock_name = row.get("stock_name", "")
              reason = row.get("reason", "")
              tags = row.get("tags", "")
              selected_time = row.get("selected_time", "")

              # reasonを100文字に切り詰め
              reason_short = reason[:100] + "..." if len(reason) > 100 else reason

              stocks_list.append({
                  "ticker": ticker,
                  "stock_name": stock_name,
                  "reason": reason_short,
                  "tags": tags,
                  "selected_time": selected_time
              })

          result = {
              "total": len(df),
              "time_counts": time_counts,
              "stocks": stocks_list
          }

          print(json.dumps(result, ensure_ascii=False))
          ' 2>/dev/null)

            # クリーンアップ
            rm -f data/parquet/grok_trending.parquet
          else
            GROK_INFO=""
          fi

          # マルチライン対応
          echo "grok_info<<EOF" >> $GITHUB_OUTPUT
          echo "$GROK_INFO" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Slack notification on success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_INCOMING_WEBHOOK_URL }}
        run: |
          TRIGGER_TIME="Manual Run"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
              TRIGGER_TIME="23:00 JST"
            elif [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
              TRIGGER_TIME="02:00 JST"
            else
              TRIGGER_TIME="16:45 JST"
            fi
          fi

          # J-Quants障害検知（空ファイルかどうか）
          JQUANTS_STATUS="✅ 正常"
          if [ "${{ steps.stats.outputs.meta_jquants_count }}" = "0" ]; then
            JQUANTS_STATUS="⚠️ 障害発生（静的銘柄のみで更新）"
          fi

          # GROK銘柄情報をフォーマット（23:00のみ）
          GROK_SECTION=""
          BILLING_SECTION=""

          # xAI billing情報を読み込み
          XAI_REMAINING=""
          if [ -f "/tmp/xai_remaining.txt" ] && [ -s "/tmp/xai_remaining.txt" ]; then
            XAI_REMAINING=$(cat /tmp/xai_remaining.txt)
          fi
          if [ -f "/tmp/billing_section.txt" ] && [ -s "/tmp/billing_section.txt" ]; then
            BILLING_SECTION=",$(cat /tmp/billing_section.txt)"
          fi

          # Granville B4 (16:45 only)
          GRANVILLE_SECTION=""
          if [ -f "/tmp/granville_b4_section.txt" ] && [ -s "/tmp/granville_b4_section.txt" ]; then
            GRANVILLE_SECTION=$(cat /tmp/granville_b4_section.txt)
          fi

          # ML Retraining (last trading day of week)
          ML_SECTION=""
          if [ -f "/tmp/ml_section.txt" ] && [ -s "/tmp/ml_section.txt" ]; then
            ML_SECTION=$(cat /tmp/ml_section.txt)
          fi

          # 23:00 または force_grok=true → GROK銘柄を表示
          if [ "${{ github.event.schedule }}" = "0 14 * * *" ] || [ "${{ github.event.inputs.force_grok }}" = "true" ]; then
            GROK_INFO='${{ steps.grok-info.outputs.grok_info }}'

            if [ -n "$GROK_INFO" ] && [ "$GROK_INFO" != "null" ]; then
              # 別ファイルのPythonスクリプトでフォーマット（YAMLエスケープ問題を回避）
              python3 scripts/format_grok_slack.py "$GROK_INFO"

              # ファイルから読み込み
              if [ -f "/tmp/grok_section.txt" ] && [ -s "/tmp/grok_section.txt" ]; then
                GROK_SECTION=$(cat /tmp/grok_section.txt)
              fi
            fi
          fi

          # タイトル構築
          SLACK_TITLE="✅ Data Pipeline Succeeded"
          if [ -n "$XAI_REMAINING" ]; then
            SLACK_TITLE="${SLACK_TITLE} | xAI: ${XAI_REMAINING}"
          fi

          MESSAGE='{
            "text": "'"${SLACK_TITLE}"'",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ *Data Pipeline Succeeded*\nWorkflow `${{ github.workflow }}` completed successfully."
                }
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`"},
                  {"type": "mrkdwn", "text": "*Trigger:*\n`'"${TRIGGER_TIME}"'`"},
                  {"type": "mrkdwn", "text": "*J-Quants:*\n'"${JQUANTS_STATUS}"'"},
                  {"type": "mrkdwn", "text": "*Latest Price Date:*\n`${{ steps.stats.outputs.latest_price_date }}`"}
                ]
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*meta_jquants:*\n`${{ steps.stats.outputs.meta_jquants_count }}`銘柄"},
                  {"type": "mrkdwn", "text": "*all_stocks:*\n`${{ steps.stats.outputs.all_stocks_count }}`銘柄"},
                  {"type": "mrkdwn", "text": "*grok_trending:*\n`${{ steps.stats.outputs.grok_trending_count }}`銘柄"},
                  {"type": "mrkdwn", "text": "*static_signals:*\n`removed`"}
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Workflow Run"},
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }'"$BILLING_SECTION$GROK_SECTION$GRANVILLE_SECTION$ML_SECTION"'
            ]
          }'
          curl -X POST -H 'Content-type: application/json' --data "$MESSAGE" "$SLACK_WEBHOOK_URL" || true

      - name: Send Slack notification on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_INCOMING_WEBHOOK_URL }}
        run: |
          TRIGGER_TIME="Manual Run"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
              TRIGGER_TIME="23:00 JST"
            elif [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
              TRIGGER_TIME="02:00 JST"
            else
              TRIGGER_TIME="16:45 JST"
            fi
          fi

          MESSAGE='{
            "text": "❌ Data Pipeline Failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *Data Pipeline Failed*\nWorkflow `${{ github.workflow }}` encountered an error."
                }
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`"},
                  {"type": "mrkdwn", "text": "*Trigger:*\n`'"${TRIGGER_TIME}"'`"},
                  {"type": "mrkdwn", "text": "*Event:*\n`${{ github.event_name }}`"}
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "⚠️ *Action Required*\nPlease check the workflow logs and investigate the failure."
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Workflow Run"},
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }'
          curl -X POST -H 'Content-type: application/json' --data "$MESSAGE" "$SLACK_WEBHOOK_URL" || true

  deploy:
    name: Build and Push to ECR
    needs: pipeline
    if: success()
    runs-on: ubuntu-latest
    environment: AWS_OIDC

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'stock-api' }}
      ECR_REPO: ${{ vars.ECR_REPO }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build Docker image with both tags
          docker build -t ${{ env.ECR_REPO }}:$IMAGE_TAG .
          docker build -t ${{ env.ECR_REPO }}:latest .

          # Push both tags to ECR
          docker push ${{ env.ECR_REPO }}:$IMAGE_TAG
          docker push ${{ env.ECR_REPO }}:latest

          echo "image=${{ env.ECR_REPO }}:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "✅ Pushed image: ${{ env.ECR_REPO }}:$IMAGE_TAG"
          echo "✅ Pushed image: ${{ env.ECR_REPO }}:latest"
          echo ""
          echo "🚀 App Runner will automatically deploy the new image."
          echo "📢 Deployment completion notification will be sent via EventBridge → Lambda → Slack"
